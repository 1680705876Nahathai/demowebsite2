<!DOCTYPE html>
<html>
<head>
    <title>Add Sushi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5">
    <h2>Add Sushi</h2>

    <form method="POST">
        <input name="name" class="form-control mb-2" placeholder="Name">
        <input name="price" class="form-control mb-2" placeholder="Price">
        <input name="stock" class="form-control mb-2" placeholder="Stock">
        <input name="image" class="form-control mb-2" placeholder="Image URL">

        <select name="category_id" class="form-control mb-2">
            {% for c in categories %}
            <option value="{{ c[0] }}">{{ c[1] }}</option>
            {% endfor %}
        </select>

        <button class="btn btn-success">Save</button>
    </form>
</div>
</body>
</html>
