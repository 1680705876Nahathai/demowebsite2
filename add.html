<!DOCTYPE html>
<html>
<head>
    <title>Add Sushi</title>
</head>
<body>
    <h1>Add New Sushi 🍣</h1>

    <form method="POST">
        ชื่อ: <input type="text" name="name"><br>
        ราคา: <input type="number" name="price"><br>
        จำนวน: <input type="number" name="stock"><br>

        หมวดหมู่:
        <select name="category_id">
            {% for c in categories %}
                <option value="{{ c[0] }}">{{ c[1] }}</option>
            {% endfor %}
        </select><br>

        รูป (URL): <input type="text" name="image"><br>

        <button type="submit">บันทึก</button>
    </form>

    <a href="/">กลับ</a>
</body>
</html>
