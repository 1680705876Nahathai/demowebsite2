<!DOCTYPE html>
<html>
<head>
    <title>Edit Sushi 🍣</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #f8f9fa, #eef2f3);
        }

        .card {
            border-radius: 15px;
        }

        .preview-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4 col-md-6 mx-auto">
        <h2 class="text-center mb-4">✏️ Edit Sushi 🍣</h2>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">ชื่อ</label>
                <input name="name" value="{{ sushi[1] }}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">ราคา</label>
                <input name="price" value="{{ sushi[2] }}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">จำนวน</label>
                <input name="stock" value="{{ sushi[3] }}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">หมวดหมู่</label>
                <select name="category_id" class="form-control">
                    {% for c in categories %}
                    <option value="{{ c[0] }}" {% if c[1] == sushi[4] %}selected{% endif %}>
                        {{ c[1] }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">รูป (URL)</label>
                <input id="imgInput" name="image" value="{{ sushi[5] }}" class="form-control">
                <img id="preview" src="{{ sushi[5] }}" class="preview-img"
                     onerror="this.src='https://via.placeholder.com/300x200?text=No+Image';">
            </div>

            <div class="d-flex justify-content-between">
                <a href="/" class="btn btn-secondary">⬅ กลับ</a>
                <button class="btn btn-success">💾 บันทึก</button>
            </div>

        </form>
    </div>

</div>

<script>
    // preview รูปแบบ realtime
    document.getElementById("imgInput").addEventListener("input", function() {
        document.getElementById("preview").src = this.value;
    });
</script>

</body>
</html>
